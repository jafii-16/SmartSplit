<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SplitSmart</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🎥 BACKGROUND VIDEO -->
<video autoplay muted loop id="bg-video">
    <source src="bg.mp4" type="video/mp4">
</video>

<!-- 🌫️ BLUR LAYER -->
<div class="blur-layer"></div>

<!-- HEADER -->
<h1 class="logo">💠 SplitSmart</h1>
<p class="tagline">Split expenses smarter, faster, and stress-free 💸</p>

<!-- MAIN -->
<div class="container">

    <!-- ADD PERSON -->
    <div class="card fade-in">
        <h3>Add Person</h3>
        <input id="personName" placeholder="Enter name">
        <button onclick="addPerson()">Add</button>
    </div>

    <!-- QUICK ADD -->
    <div class="card fade-in">
        <h3>Quick Add</h3>
        <input id="quickInput" placeholder="e.g. Annie 500">
        <button onclick="quickAdd()">Add Instantly</button>
    </div>

    <!-- ADD EXPENSE -->
    <div class="card fade-in">
        <h3>Add Expense</h3>
        <select id="payer"></select>
        <input id="amount" placeholder="Amount">
        <button onclick="addExpense()">Add Expense</button>
    </div>

    <!-- PEOPLE -->
    <div class="card fade-in">
        <h3>People</h3>
        <ul id="peopleList"></ul>
    </div>

    <!-- EXPENSES -->
    <div class="card fade-in">
        <h3>Expenses</h3>
        <ul id="expenseList"></ul>
    </div>

    <!-- BALANCES -->
    <div class="card fade-in">
        <h3>Live Balances</h3>
        <ul id="balanceList"></ul>
    </div>

    <!-- INSIGHTS -->
    <div class="card fade-in">
        <h3>Insights</h3>
        <pre id="summary"></pre>
    </div>

    <!-- SETTLEMENTS -->
    <div class="card fade-in">
        <h3>Settlements</h3>
        <ul id="settlementList"></ul>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
